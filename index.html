                <div>

                    <h4 className={`text-sm font-bold uppercase tracking-wide ${checked ? 'text-green-600' : 'text-gray-500'}`}>{title}</h4>

                  {meal.calories && (
                     <span className={`mt-3 inline-block text-xs font-semibold px-2 py-1 rounded-lg backdrop-blur-sm border ${checked ? 'bg-transparent text-green-600 border-green-200' : 'bg-white/60 text-gray-600 border-gray-100'}`}>

              </div>

            <div className={`p-3 rounded-xl flex flex-col justify-center ${isLight ? 'bg-gray-50' : 'bg-green-50/50 border border-green-100/50'}`}>
              <span className="text-xs font-bold text-gray-400 uppercase">{title}</span>
              <span className="text-sm font-medium text-gray-700 leading-tight mt-1">{name}</span>

              </div>
              <span className="text-[10px] font-bold">{label}</span>

              {showOnboarding && (
                <div className="fixed inset-0 bg-green-50 z-[100] flex flex-col items-center justify-center p-6 animate-fade-in">
                  <div className="w-full max-w-md bg-white rounded-3xl shadow-2xl p-8 text-center animate-fade-in-up max-h-[90vh] overflow-y-auto no-scrollbar">
                    <div className="flex justify-center mb-6">
                      <div className="bg-green-100 p-4 rounded-full text-green-600">
                        <Icon name="Activity" size={48} />
                      </div>
                    </div>
                    <h2 className="text-3xl font-black text-gray-800 mb-2">Bienvenido a NutriReto</h2>
                    <p className="text-gray-500 mb-8">Personalicemos tu experiencia para ayudarte a lograr tus objetivos.</p>
                    
                    <form onSubmit={handleOnboardingSubmit} className="space-y-4 text-left">
                      <div>
                        <label className="block text-sm font-bold text-gray-700 mb-1">Tu Nombre o Apodo</label>
                        <input required type="text" value={formName} onChange={e => setFormName(e.target.value)} className="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-green-500" placeholder="Ej. Alex" />
                      </div>
                      <div className="grid grid-cols-2 gap-4">
                        <div>
                          <label className="block text-sm font-bold text-gray-700 mb-1">Edad</label>
                          <input required type="number" min="10" max="100" value={formAge} onChange={e => setFormAge(e.target.value)} className="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-green-500" placeholder="Ej. 28" />
                        </div>
                        <div>
                          <label className="block text-sm font-bold text-gray-700 mb-1">Peso Actual (kg)</label>
                          <input required type="number" step="0.1" min="30" max="250" value={formWeight} onChange={e => setFormWeight(e.target.value)} className="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-green-500" placeholder="Ej. 75" />
                        </div>
                      </div>
                      <div>
                        <label className="block text-sm font-bold text-gray-700 mb-1">Meta: Kilos a perder</label>
                        <input required type="number" step="0.1" min="0" max="100" value={formGoal} onChange={e => setFormGoal(e.target.value)} className="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-green-500" placeholder="Ej. 5 (0 si solo quieres mantener)" />
                      </div>
                      <button type="submit" className="w-full bg-green-500 text-white font-bold text-lg py-4 rounded-xl hover:bg-green-600 transition-colors mt-4 shadow-lg shadow-green-200">
                        ¡Comenzar mi Reto!
                      </button>
                    </form>
                  </div>
                </div>
              )}

              {/* VENTANA EMERGENTE (MODAL) DE DETALLES DE COMIDA */}
              {selectedMeal && (
                <div className="fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-4 animate-fade-in backdrop-blur-sm">
                  <div className="bg-white rounded-3xl w-full max-w-md overflow-hidden shadow-2xl relative transform transition-all animate-fade-in-up">
                    <div className="bg-gradient-to-r from-green-500 to-emerald-600 p-5 text-white flex justify-between items-start">
                      <div>
                        <span className="bg-white/20 px-2 py-1 rounded-lg text-xs font-bold uppercase tracking-wider mb-2 inline-block shadow-sm">Receta Express</span>
                        <h3 className="font-bold text-2xl leading-tight pr-4">{selectedMeal.name}</h3>
                      </div>
                      <button onClick={() => setSelectedMeal(null)} className="p-2 hover:bg-white/20 rounded-full transition-colors flex items-center justify-center">
                        <Icon name="X" size={20}/>
                      </button>
                    </div>
                    
                    <div className="p-6 space-y-5 max-h-[60vh] overflow-y-auto no-scrollbar">
                       <div className="flex justify-between items-center bg-orange-50 border border-orange-100 p-4 rounded-2xl">
                         <span className="font-bold text-orange-700 flex items-center gap-2">🔥 Calorías Aprox.</span>
                         <span className="text-2xl font-black text-orange-500">{selectedMeal.calories} kcal</span>
                       </div>

                       <div>
                         <h4 className="font-bold text-gray-800 mb-3 flex items-center gap-2">
                           <Icon name="ShoppingBasket" className="text-green-500" size={16} /> Ingredientes Principales:
                         </h4>
                         <div className="flex flex-wrap gap-2">
                           {selectedMeal.ingredients.map(i => (
                             <span key={i} className="bg-gray-100 text-gray-600 px-3 py-1 rounded-full text-sm capitalize">{i}</span>
                           ))}
                         </div>
                       </div>

                       <div className="bg-blue-50/50 p-4 rounded-2xl border border-blue-50">
                         <h4 className="font-bold text-blue-800 mb-2 flex items-center gap-2">
                           <Icon name="Activity" size={16} /> Preparación Rápida:
                         </h4>
                         <p className="text-gray-700 text-sm leading-relaxed">{selectedMeal.recipe}</p>
                       </div>
                    </div>
                    
                    <div className="p-4 bg-gray-50 border-t border-gray-100">
                       <button onClick={() => setSelectedMeal(null)} className="w-full py-3 bg-gray-200 text-gray-700 font-bold rounded-xl hover:bg-gray-300 transition-colors">
                         Cerrar y volver al menú
                       </button>
                    </div>
                  </div>
                </div>
              )}
            </div>
          );
        }

        // Renderizado inicial en el DOM (Recuperación de pantalla blanca)
        try {
          const root = ReactDOM.createRoot(document.getElementById('root'));
          root.render(<App />);
        } catch (e) {
          document.getElementById('root').innerHTML = '<div style="padding: 20px; text-align: center; color: red;">Error crítico al cargar. Por favor, limpia la caché de tu navegador.</div>';
          console.error(e);
        }
    </script>
</body>
</html>
